<!-- @dsCard group="Components" name="Holding row" subtitle="Issuer avatar (flag / logo / monogram), name + maturity, P&L or price" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bond Book — Holding row</title>
<style>
  :root { --bg:#F6F8F7; --ink:#182B27; --muted:#5F7470; --line:#E3E9E7; --chip:#EAF1EF;
          --gain:#1A7F37; --loss:#B42318; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0F1514; --ink:#E9F0EE; --muted:#96A8A3; --line:#2A3634; --chip:#233029;
            --gain:#4ADE80; --loss:#F87171; } }
  body { margin:0; padding:20px; background:var(--bg); color:var(--ink);
         font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing:antialiased; }
  .num { font-variant-numeric: tabular-nums; }
  .list { display:flex; flex-direction:column; max-width:400px; }
  .holding {
    width:100%; text-align:left; font:inherit; color:inherit; cursor:pointer;
    background:none; border:none; border-bottom:1px solid var(--line);
    padding:14px 4px;
    display:flex; justify-content:space-between; align-items:center; gap:16px;
  }
  .holding:last-child { border-bottom:none; }
  .holding:active { background:var(--chip); }
  .h-avatar { flex-shrink:0; width:32px; height:32px; border-radius:50%; background:var(--chip);
              display:flex; align-items:center; justify-content:center; font-size:17px; overflow:hidden; }
  .h-avatar img.flag { width:100%; height:100%; }
  .h-avatar.mono { font-size:15px; font-weight:700; color:var(--muted); }
  .h-left { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
  .h-right { flex-shrink:0; display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
  .h-name { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .h-mty { font-weight:400; color:var(--muted); }
  .h-sub { font-size:13px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .h-value { font-weight:600; }
  .h-meta { font-size:13px; color:var(--muted); }
  .pnl-pos { color:var(--gain); }
  .pnl-neg { color:var(--loss); }
</style>
</head>
<body>
  <div class="list">
    <button class="holding">
      <span class="h-avatar"><img class="flag" src="https://hatscripts.github.io/circle-flags/flags/om.svg" alt=""></span>
      <span class="h-left">
        <span class="h-name">Oman <span class="h-mty">Aug 2047</span></span>
        <span class="h-sub num">$500,000 nominal</span>
      </span>
      <span class="h-right">
        <span class="h-value num">$530,000.00</span>
        <span class="h-meta num pnl-pos">+$25,000.00 (+4.95%)</span>
      </span>
    </button>
    <button class="holding">
      <span class="h-avatar"><img class="flag" src="https://hatscripts.github.io/circle-flags/flags/jo.svg" alt=""></span>
      <span class="h-left">
        <span class="h-name">Jordan <span class="h-mty">Oct 2047</span></span>
        <span class="h-sub num">$200,000 nominal</span>
      </span>
      <span class="h-right">
        <span class="h-value num">$200,000.00</span>
        <span class="h-meta num pnl-pos">+$3,000.00 (+1.52%)</span>
      </span>
    </button>
    <button class="holding">
      <span class="h-avatar mono">A</span>
      <span class="h-left">
        <span class="h-name">Acme Corp</span>
        <span class="h-sub num">$50,000 nominal · 12d-old price</span>
      </span>
      <span class="h-right">
        <span class="h-value num">$49,500.00</span>
        <span class="h-meta num">@ 99</span>
      </span>
    </button>
  </div>
</body>
</html>
