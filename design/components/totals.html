<!-- @dsCard group="Components" name="Portfolio summary" subtitle="Big market value, nominal sub-line, P&L when known" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bond Book — Portfolio summary</title>
<style>
  :root { --bg:#F6F8F7; --ink:#182B27; --muted:#5F7470; --gain:#1A7F37; --loss:#B42318; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0F1514; --ink:#E9F0EE; --muted:#96A8A3; --gain:#4ADE80; --loss:#F87171; } }
  body { margin:0; padding:24px; background:var(--bg); color:var(--ink);
         font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing:antialiased; }
  .num { font-variant-numeric: tabular-nums; }
  .summary { display:flex; flex-direction:column; gap:24px; max-width:400px; }
  .sum-label { font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .sum-value { font-size:clamp(24px, 8.5vw, 34px); font-weight:700; letter-spacing:-0.02em; line-height:1.1; white-space:nowrap; }
  .sum-sub { font-size:14px; color:var(--muted); margin-top:5px; }
  .sum-pnl { font-size:14px; font-weight:600; margin-top:3px; }
  .pnl-pos { color:var(--gain); }
  .pnl-neg { color:var(--loss); }
</style>
</head>
<body>
  <div class="summary">
    <div>
      <div class="sum-label">USD portfolio</div>
      <div class="sum-value num">$2,532,115</div>
      <div class="sum-sub num">$2,590,000 nominal</div>
      <div class="sum-pnl num pnl-pos">+$18,420.00 (+1.44%) unrealized</div>
    </div>
    <div>
      <div class="sum-label">EUR portfolio</div>
      <div class="sum-value num">€50,959.00</div>
      <div class="sum-sub num">€50,000 nominal</div>
    </div>
  </div>
</body>
</html>
