<!-- @dsCard group="Components" name="Editor form" subtitle="Grouped sections: bond / position / prices, stacked actions, month picker" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bond Book — Editor form</title>
<style>
  :root { --bg:#F6F8F7; --surface:#FFFFFF; --ink:#182B27; --muted:#5F7470; --line:#E3E9E7;
          --accent:#0E7566; --accent-contrast:#FFFFFF; --chip:#EAF1EF; --danger:#B42318;
          --shadow:0 1px 2px rgba(24,43,39,.06), 0 4px 16px rgba(24,43,39,.05); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0F1514; --surface:#1A2321; --ink:#E9F0EE; --muted:#96A8A3; --line:#2A3634;
            --accent:#43C9B0; --accent-contrast:#06251F; --chip:#233029; --danger:#F87171;
            --shadow:0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3); } }
  body { margin:0; padding:20px; background:var(--bg); color:var(--ink);
         font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing:antialiased; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);
          padding:20px; max-width:420px; display:flex; flex-direction:column; gap:12px; }
  h2 { margin:0 0 4px; font-size:18px; letter-spacing:-0.01em; }
  .form-section { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
                  color:var(--muted); margin:8px 0 -2px; }
  label { display:flex; flex-direction:column; gap:5px; font-size:13px; font-weight:600; color:var(--muted); }
  input, select { font:inherit; font-size:16px; color:var(--ink); background:var(--bg); border:1px solid var(--line);
                  border-radius:10px; padding:12px 14px; width:100%; box-sizing:border-box; height:48px; }
  select { -webkit-appearance:none; appearance:none;
           background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path d='M4 6l4 4 4-4' fill='none' stroke='%23808f8b' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>");
           background-repeat:no-repeat; background-position:right 12px center; padding-right:36px; }
  input:focus, select:focus { outline:2px solid var(--accent); outline-offset:-1px; border-color:transparent; }
  .issuer-field { display:flex; align-items:center; gap:10px; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:0 12px; height:48px; }
  .issuer-field input { border:none; background:none; height:auto; padding:0; flex:1; min-width:0; }
  .issuer-field img { width:28px; height:28px; border-radius:50%; flex-shrink:0; }
  .field-row { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px; }
  .editor-actions { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .primary-btn { background:var(--accent); color:var(--accent-contrast); border:none; border-radius:10px;
                 font:inherit; font-size:16px; font-weight:700; padding:13px; cursor:pointer; }
  .secondary-btn { background:var(--chip); color:var(--ink); border:none; border-radius:10px;
                   font:inherit; font-size:16px; font-weight:600; padding:13px; cursor:pointer; }
  .danger-btn { background:none; border:none; color:var(--danger); font:inherit; font-size:15px;
                font-weight:600; cursor:pointer; padding:10px; }
</style>
</head>
<body>
  <div class="card">
    <h2>Edit bond</h2>
    <p class="form-section">Bond</p>
    <label>Issuer
      <select><option selected>🇴🇲 Oman</option><option>🇯🇴 Jordan</option><option>Other…</option></select>
    </label>
    <div class="field-row">
      <label>Maturity
        <select><option selected>August</option><option>September</option></select>
      </label>
      <label>Year
        <select><option selected>2047</option><option>2048</option></select>
      </label>
    </div>
    <p class="form-section">Position</p>
    <div class="field-row">
      <label>Nominal value
        <input type="text" value="500,000" inputmode="decimal">
      </label>
      <label>Currency
        <select><option selected>USD</option><option>EUR</option><option>AED</option></select>
      </label>
    </div>
    <p class="form-section">Prices · % of par</p>
    <div class="field-row">
      <label>Purchase
        <input type="number" placeholder="optional" inputmode="decimal">
      </label>
      <label>Current
        <input type="number" value="106" inputmode="decimal">
      </label>
    </div>
    <div class="editor-actions">
      <button class="primary-btn" type="button">Save</button>
      <button class="secondary-btn" type="button">Cancel</button>
    </div>
    <button class="danger-btn" type="button">Delete this bond</button>
  </div>
</body>
</html>
